      </div>
    </div>
  );
}

// --- Admin: Dashboard ---
function AdminDashboard({ user, socket, toast }) {
  const [stats, setStats] = useState(null);

  const refresh = useCallback(async () => {
    try { setStats(await API.get('/api/stats')); } catch {}
  }, []);

  useEffect(() => {
    refresh();
    const iv = setInterval(refresh, 10000);
    if (socket) {
      socket.on('queue:update', refresh);
      return () => { clearInterval(iv); socket.off('queue:update', refresh); };
    }
    return () => clearInterval(iv);
  }, [socket, refresh]);

  const resetQueue = async () => {
    if (!confirm('¿Cerrar todos los turnos activos?')) return;
    try { await API.post('/api/admin/reset-queue', {}); toast('Cola reiniciada', 'success'); refresh(); }
    catch (e) { toast(e.message, 'error'); }
  };
  const resetCounters = async () => {
    if (!confirm('¿Reiniciar contadores a 000?')) return;
    try { await API.post('/api/admin/reset-counters', {}); toast('Contadores reiniciados', 'success'); }
    catch (e) { toast(e.message, 'error'); }
  };

  if (!stats) return <div style={{ display: 'flex', alignItems: 'center', gap: 10, color: 'var(--text-muted)' }}><Spinner /> Cargando...</div>;

  const maxH = Math.max(...stats.byHour.map(h => h.count), 1);

  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Dashboard</h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: '4px 0 0' }}>Resumen del día — {new Date().toLocaleDateString('es-PY', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
        </div>
        {(user.role === 'admin' || user.role === 'gerente') && (
          <div style={{ display: 'flex', gap: 10 }}>
            <Btn onClick={resetCounters} variant="secondary" size="sm">↺ Reiniciar contadores</Btn>
            <Btn onClick={resetQueue} variant="danger" size="sm">⚡ Limpiar cola</Btn>
          </div>
        )}
      </div>

      {/* KPI Row */}
      <div style={{ display: 'flex', gap: 14, marginBottom: 24, flexWrap: 'wrap' }}>
        <StatCard label="Total de turnos" value={stats.total} icon="🎫" color="#A78BFA" />
        <StatCard label="En espera" value={stats.waiting} icon="⏳" color="#F59E0B" />
        <StatCard label="En atención" value={stats.attending} icon="💼" color="#3B82F6" />
        <StatCard label="Completados" value={stats.completed} icon="✅" color="#10B981" />
        <StatCard label="Ausentes" value={stats.skipped} icon="❌" color="#EF4444" />
        <StatCard label="T. atención prom." value={`${stats.avgAttTime}m`} icon="⏱" color="#60A5FA" />
        <StatCard label="T. espera prom." value={`${stats.avgWaitTime}m`} icon="🕐" color="#34D399" />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
        {/* By service */}
        <div className="card" style={{ padding: 22 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 18, marginTop: 0 }}>📊 Turnos por Servicio</h3>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {stats.byService.map(s => (
              <div key={s.id}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5, fontSize: 13 }}>
                  <span style={{ color: 'var(--text-muted)', display: 'flex', alignItems: 'center', gap: 6 }}><span>{s.emoji}</span>{s.name}</span>
                  <span style={{ fontFamily: 'JetBrains Mono', fontWeight: 700, color: s.color }}>{s.total}</span>
                </div>
                <div style={{ height: 6, background: 'var(--bg-card2)', borderRadius: 99, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${stats.total ? (s.total / stats.total * 100) : 0}%`, background: s.color, borderRadius: 99, transition: 'width 0.5s ease' }} />
                </div>
                <div style={{ display: 'flex', gap: 10, marginTop: 4, fontSize: 11, color: 'var(--text-dim)' }}>
                  <span style={{ color: '#10B981' }}>✓ {s.completed}</span>
                  <span style={{ color: '#EF4444' }}>✕ {s.skipped}</span>
                  <span style={{ color: '#F59E0B' }}>⏳ {s.waiting}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* By agent */}
        <div className="card" style={{ padding: 22 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 18, marginTop: 0 }}>👤 Rendimiento de Agentes</h3>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead>
              <tr style={{ fontSize: 11, color: 'var(--text-dim)', textTransform: 'uppercase' }}>
                <th style={{ textAlign: 'left', padding: '0 0 10px', fontWeight: 700 }}>Agente</th>
                <th style={{ textAlign: 'right', padding: '0 0 10px', fontWeight: 700 }}>Atendidos</th>
                <th style={{ textAlign: 'right', padding: '0 0 10px', fontWeight: 700 }}>Ausentes</th>
                <th style={{ textAlign: 'right', padding: '0 0 10px', fontWeight: 700 }}>T. prom.</th>
              </tr>
            </thead>
            <tbody>
              {stats.byAgent.map(a => (
                <tr key={a.id} className="tr-hover" style={{ borderTop: '1px solid var(--border)', fontSize: 13 }}>
                  <td style={{ padding: '10px 0', fontWeight: 500 }}>{a.name}</td>
                  <td style={{ textAlign: 'right', color: '#10B981', fontFamily: 'JetBrains Mono' }}>{a.completed}</td>
                  <td style={{ textAlign: 'right', color: '#EF4444', fontFamily: 'JetBrains Mono' }}>{a.skipped}</td>
                  <td style={{ textAlign: 'right', color: '#60A5FA', fontFamily: 'JetBrains Mono' }}>{a.avgTime}m</td>
                </tr>
              ))}
              {stats.byAgent.length === 0 && <tr><td colSpan={4} style={{ color: 'var(--text-dim)', padding: '14px 0', fontSize: 13 }}>Sin datos aún</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* By hour chart */}
      <div className="card" style={{ padding: 22 }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 18, marginTop: 0 }}>📈 Turnos por Hora</h3>
        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 80 }}>
          {stats.byHour.map(h => (
            <div key={h.hour} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
              <div style={{ width: '100%', background: 'var(--primary)', borderRadius: '3px 3px 0 0', height: `${(h.count / maxH) * 64}px`, minHeight: h.count > 0 ? 4 : 0, opacity: 0.8, transition: 'height 0.3s' }} />
              <div style={{ fontSize: 9, color: 'var(--text-dim)' }}>{h.label}</div>
            </div>
          ))}
          {stats.byHour.length === 0 && <div style={{ color: 'var(--text-dim)', fontSize: 13 }}>Sin datos registrados hoy</div>}
        </div>
      </div>
    </div>
  );
}

// --- Admin: History (full page, all tickets) ---
function AdminHistory({ toast }) {
  const [data, setData]       = useState({ items: [], total: 0, page: 1, totalPages: 1 });
  const [page, setPage]       = useState(1);
  const [date, setDate]       = useState(new Date().toISOString().slice(0, 10));
  const [status, setStatus]   = useState('');
  const [search, setSearch]   = useState('');
  const [agents, setAgents]   = useState([]);
  const [agentId, setAgentId] = useState('');
  const [loading, setLoading] = useState(false);

  const STATUS_LABEL = { waiting:'En Espera', called:'Llamando', attending:'En Atención', completed:'Atendido', skipped:'Ausente', redirected:'Derivado' };
  const STATUS_COLOR = { waiting:'#F59E0B', called:'#60A5FA', attending:'#10B981', completed:'#6B7280', skipped:'#EF4444', redirected:'#8B5CF6' };

  useEffect(() => {
    API.get('/api/users').then(u => setAgents(u.filter(x => x.role === 'agente'))).catch(() => {});
  }, []);

  const load = useCallback(async (p = 1) => {
    setLoading(true);
    try {
      const params = new URLSearchParams({ page: p, perPage: 20 });
      if (date)    params.set('date', date);
      if (status)  params.set('status', status);
      if (search)  params.set('search', search);
      if (agentId) params.set('agentId', agentId);
      const d = await API.get(`/api/agent/history?${params}`);
      setData(d); setPage(p);
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  }, [date, status, search, agentId]);

  useEffect(() => { load(1); }, [load]);

  function dur(a, b) {
    if (!a || !b) return '—';
    const s = Math.round((new Date(b) - new Date(a)) / 1000);
    if (s < 60) return `${s}s`;
    return `${Math.floor(s/60)}m ${s%60}s`;
  }

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h2 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>📋 Historial de Tickets</h2>
        <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: '4px 0 0' }}>Todos los tickets del sistema con filtros avanzados</p>
      </div>

      {/* Filters */}
      <div className="card" style={{ padding: 18, marginBottom: 20 }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
          <div style={{ flex: '1 1 130px' }}>
            <label style={{ fontSize: 12, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600 }}>Fecha</label>
            <input type="date" className="tf-input" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div style={{ flex: '1 1 140px' }}>
            <label style={{ fontSize: 12, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600 }}>Estado</label>
            <select className="tf-select" value={status} onChange={e => setStatus(e.target.value)} style={{ width: '100%' }}>
              <option value="">Todos los estados</option>
              {Object.entries(STATUS_LABEL).map(([v, l]) => <option key={v} value={v}>{l}</option>)}
            </select>
          </div>
          <div style={{ flex: '1 1 150px' }}>
            <label style={{ fontSize: 12, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600 }}>Agente</label>
            <select className="tf-select" value={agentId} onChange={e => setAgentId(e.target.value)} style={{ width: '100%' }}>
              <option value="">Todos los agentes</option>
              {agents.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div style={{ flex: '2 1 180px' }}>
            <label style={{ fontSize: 12, color: 'var(--text-muted)', display: 'block', marginBottom: 5, fontWeight: 600 }}>Buscar</label>
            <input className="tf-input" placeholder="Número o servicio..." value={search}
              onChange={e => setSearch(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && load(1)} />
          </div>
          <Btn onClick={() => load(1)} variant="primary" disabled={loading}>
            {loading ? <Spinner size={14} /> : '🔍 Buscar'}
          </Btn>
          <Btn onClick={() => { setDate(''); setStatus(''); setSearch(''); setAgentId(''); }} variant="secondary">
            ✕ Limpiar
          </Btn>
        </div>
      </div>

      {/* Summary */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
        <StatCard label="Resultados" value={data.total} icon="🎫" color="var(--primary-light)" />
        <StatCard label="Atendidos" value={data.items.filter(t => t.status === 'completed').length} icon="✅" color="#10B981" />
        <StatCard label="Ausentes" value={data.items.filter(t => t.status === 'skipped').length} icon="❌" color="#EF4444" />
        <StatCard label="En espera" value={data.items.filter(t => t.status === 'waiting').length} icon="⏳" color="#F59E0B" />
      </div>

      {/* Table */}
      <div className="card" style={{ overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ background: 'var(--bg-card2)', fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 }}>
                {['Ticket','Servicio','Ventanilla','Agente','Estado','Emitido','Llamado','Inicio Atención','Finalizado','T. Espera','T. Atención'].map(h => (
                  <th key={h} style={{ padding: '11px 14px', textAlign: 'left', fontWeight: 700, whiteSpace: 'nowrap' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {loading && data.items.length === 0 && (
                <tr><td colSpan={11} style={{ padding: 32, textAlign: 'center' }}><Spinner size={24} /></td></tr>
              )}
              {!loading && data.items.length === 0 && (
                <tr><td colSpan={11} style={{ padding: '36px', textAlign: 'center', color: 'var(--text-dim)', fontSize: 14 }}>
                  Sin resultados para los filtros seleccionados
                </td></tr>
              )}
              {data.items.map(t => (
                <tr key={t.id} className="tr-hover" style={{ borderTop: '1px solid var(--border)' }}>
                  <td style={{ padding: '10px 14px' }}>
                    <span className="ticket-num" style={{ fontSize: 16, color: t.serviceColor }}>{t.number}</span>
                  </td>
                  <td style={{ padding: '10px 14px', whiteSpace: 'nowrap' }}>
                    {t.serviceEmoji} {t.serviceName}
                  </td>
                  <td style={{ padding: '10px 14px', color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>
                    {t.stationName || '—'}
                  </td>
                  <td style={{ padding: '10px 14px', color: 'var(--text-muted)', whiteSpace: 'nowrap' }}>
                    {t.agentName || '—'}
                  </td>
                  <td style={{ padding: '10px 14px' }}>
                    <span className="badge" style={{ background: (STATUS_COLOR[t.status]||'#888')+'22', color: STATUS_COLOR[t.status]||'#888' }}>
                      {STATUS_LABEL[t.status]||t.status}
                    </span>
                  </td>
                  {[t.createdAt, t.calledAt, t.attendedAt, t.completedAt].map((ts, i) => (
                    <td key={i} style={{ padding: '10px 14px', color: 'var(--text-muted)', whiteSpace: 'nowrap', fontFamily: 'JetBrains Mono', fontSize: 11 }}>
                      {ts ? new Date(ts).toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '—'}
                    </td>
                  ))}
                  <td style={{ padding: '10px 14px', whiteSpace: 'nowrap', fontFamily: 'JetBrains Mono', fontSize: 12, color: '#60A5FA' }}>
                    {dur(t.createdAt, t.calledAt)}
                  </td>
                  <td style={{ padding: '10px 14px', whiteSpace: 'nowrap', fontFamily: 'JetBrains Mono', fontSize: 12, color: '#10B981' }}>
                    {dur(t.attendedAt, t.completedAt)}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Pagination */}
        {data.totalPages > 1 && (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 20px', borderTop: '1px solid var(--border)' }}>
            <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>
              Mostrando {((page-1)*20)+1}–{Math.min(page*20, data.total)} de {data.total}
            </span>
            <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
              <Btn onClick={() => load(1)}        variant="secondary" size="sm" disabled={page===1||loading}>«</Btn>
              <Btn onClick={() => load(page-1)}   variant="secondary" size="sm" disabled={page===1||loading}>‹ Anterior</Btn>
              {Array.from({ length: Math.min(5, data.totalPages) }, (_, i) => {
                let p;
                if (data.totalPages <= 5) p = i + 1;
                else if (page <= 3) p = i + 1;
                else if (page >= data.totalPages - 2) p = data.totalPages - 4 + i;
                else p = page - 2 + i;
                return (
                  <button key={p} onClick={() => load(p)} disabled={loading}
                    style={{ width: 34, height: 34, borderRadius: 7, border: '1px solid var(--border-light)', fontWeight: p===page ? 800 : 400,
                      background: p===page ? 'var(--primary)' : 'var(--bg-card2)', color: p===page ? '#fff' : 'var(--text-muted)',
                      cursor: 'pointer', fontFamily: 'JetBrains Mono', fontSize: 13 }}>
                    {p}
                  </button>
                );
              })}
              <Btn onClick={() => load(page+1)}        variant="secondary" size="sm" disabled={page===data.totalPages||loading}>Siguiente ›</Btn>
              <Btn onClick={() => load(data.totalPages)} variant="secondary" size="sm" disabled={page===data.totalPages||loading}>»</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- Admin: Users ---
function AdminUsers({ user: currentUser, toast }) {
  const [users, setUsers] = useState([]);
  const [stations, setStations] = useState([]);
  const [modal, setModal] = useState(null); // null | { mode: 'create'|'edit', data? }
  const [form, setForm] = useState({});
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    try {
      const [u, s] = await Promise.all([API.get('/api/users'), API.get('/api/stations')]);
      setUsers(u); setStations(s);
    } catch (e) { toast(e.message, 'error'); }
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const roleColors = { admin: '#8B5CF6', gerente: '#3B82F6', agente: '#10B981', cliente: '#F59E0B' };
  const roleLabels = { admin: 'Admin', gerente: 'Gerente', agente: 'Agente', cliente: 'Cliente' };
  const availableRoles = currentUser.role === 'admin'
    ? ['admin', 'gerente', 'agente']
    : ['agente'];

  const openCreate = () => { setForm({ role: 'agente', active: true }); setModal({ mode: 'create' }); };
  const openEdit   = u => { setForm({ ...u, password: '' }); setModal({ mode: 'edit', id: u.id }); };

  const save = async () => {
    if (!form.name || !form.username) { toast('Nombre y usuario son obligatorios', 'warning'); return; }
    if (modal.mode === 'create' && !form.password) { toast('La contraseña es obligatoria', 'warning'); return; }
    setLoading(true);
    try {
      if (modal.mode === 'create') await API.post('/api/users', form);
      else await API.put(`/api/users/${modal.id}`, form);
      toast(modal.mode === 'create' ? 'Usuario creado' : 'Usuario actualizado', 'success');
      setModal(null); refresh();
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  const deactivate = async id => {
    if (!confirm('¿Desactivar este usuario?')) return;
    try { await API.delete(`/api/users/${id}`); toast('Usuario desactivado', 'success'); refresh(); }
    catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Usuarios</h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: '4px 0 0' }}>{users.filter(u => u.active).length} usuarios activos</p>
        </div>
        <Btn onClick={openCreate} variant="primary">+ Nuevo Usuario</Btn>
      </div>

      <div className="card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead style={{ background: 'var(--bg-card2)' }}>
            <tr style={{ fontSize: 12, color: 'var(--text-muted)', textTransform: 'uppercase' }}>
              {['Nombre', 'Usuario', 'Rol', 'Ventanilla', 'Estado', 'Acciones'].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 700, letterSpacing: 0.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map(u => (
              <tr key={u.id} className="tr-hover" style={{ borderTop: '1px solid var(--border)', fontSize: 14 }}>
                <td style={{ padding: '13px 16px', fontWeight: 600 }}>{u.name}</td>
                <td style={{ padding: '13px 16px', color: 'var(--text-muted)', fontFamily: 'JetBrains Mono', fontSize: 13 }}>{u.username}</td>
                <td style={{ padding: '13px 16px' }}><Badge color={roleColors[u.role]}>{roleLabels[u.role]}</Badge></td>
                <td style={{ padding: '13px 16px', color: 'var(--text-muted)', fontSize: 13 }}>{stations.find(s => s.id === u.stationId)?.name || '—'}</td>
                <td style={{ padding: '13px 16px' }}>
                  <span style={{ fontSize: 11, padding: '3px 8px', borderRadius: 99, fontWeight: 600, background: u.active ? '#10B98122' : '#EF444422', color: u.active ? '#10B981' : '#EF4444' }}>
                    {u.active ? '● Activo' : '○ Inactivo'}
                  </span>
                </td>
                <td style={{ padding: '13px 16px' }}>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <Btn onClick={() => openEdit(u)} variant="secondary" size="sm">Editar</Btn>
                    {u.active && u.id !== currentUser.id && <Btn onClick={() => deactivate(u.id)} variant="ghost" size="sm">Desactivar</Btn>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Modal open={!!modal} onClose={() => setModal(null)} title={modal?.mode === 'create' ? '+ Nuevo Usuario' : '✏️ Editar Usuario'}>
        <FormField label="Nombre completo">
          <input className="tf-input" value={form.name || ''} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Ej: Juan Pérez" />
        </FormField>
        <FormField label="Nombre de usuario">
          <input className="tf-input" value={form.username || ''} onChange={e => setForm(f => ({ ...f, username: e.target.value }))} placeholder="Ej: juan.perez" />
        </FormField>
        <FormField label={modal?.mode === 'edit' ? 'Nueva contraseña (dejar vacío para mantener)' : 'Contraseña'}>
          <input className="tf-input" type="password" value={form.password || ''} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} placeholder="••••••••" />
        </FormField>
        <FormField label="Rol">
          <select className="tf-select" style={{ width: '100%' }} value={form.role || 'agente'} onChange={e => setForm(f => ({ ...f, role: e.target.value }))}>
            {availableRoles.map(r => <option key={r} value={r}>{roleLabels[r]}</option>)}
          </select>
        </FormField>
        {form.role === 'agente' && (
          <FormField label="Ventanilla asignada">
            <select className="tf-select" style={{ width: '100%' }} value={form.stationId || ''} onChange={e => setForm(f => ({ ...f, stationId: e.target.value }))}>
              <option value="">— Sin asignar —</option>
              {stations.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </FormField>
        )}
        <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
          <Btn onClick={() => setModal(null)} variant="secondary" full>Cancelar</Btn>
          <Btn onClick={save} variant="primary" full disabled={loading}>{loading ? <Spinner size={16} /> : 'Guardar'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

// --- Admin: Services ---
function AdminServices({ toast }) {
  const [services, setServices] = useState([]);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    try { setServices(await API.get('/api/services/all')); } catch (e) { toast(e.message, 'error'); }
  }, []);
  useEffect(() => { refresh(); }, [refresh]);

  const openCreate = () => { setForm({ color: '#6366F1', emoji: '⭐', avgTime: 5, priority: 1 }); setModal({ mode: 'create' }); };
  const openEdit   = s => { setForm({ ...s }); setModal({ mode: 'edit', id: s.id }); };

  const save = async () => {
    if (!form.name || !form.prefix) { toast('Nombre y prefijo son obligatorios', 'warning'); return; }
    setLoading(true);
    try {
      if (modal.mode === 'create') await API.post('/api/services', form);
      else await API.put(`/api/services/${modal.id}`, form);
      toast('Servicio guardado', 'success'); setModal(null); refresh();
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  const del = async id => {
    if (!confirm('¿Desactivar este servicio?')) return;
    try { await API.delete(`/api/services/${id}`); toast('Servicio desactivado', 'success'); refresh(); }
    catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Servicios</h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: '4px 0 0' }}>Tipos de atención disponibles en el tótem</p>
        </div>
        <Btn onClick={openCreate} variant="primary">+ Nuevo Servicio</Btn>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 16 }}>
        {services.map(s => (
          <div key={s.id} className="card" style={{ padding: 22, borderTop: `3px solid ${s.color}`, opacity: s.active ? 1 : 0.5 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <span style={{ fontSize: 32 }}>{s.emoji}</span>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16 }}>{s.name}</div>
                <div className="badge" style={{ background: s.color + '22', color: s.color, marginTop: 2 }}>{s.prefix}###</div>
              </div>
            </div>
            <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 12 }}>{s.description}</div>
            <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 14 }}>⏱ {s.avgTime} min promedio · Prioridad {s.priority}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn onClick={() => openEdit(s)} variant="secondary" size="sm">Editar</Btn>
              {s.active && <Btn onClick={() => del(s.id)} variant="ghost" size="sm">Desactivar</Btn>}
            </div>
          </div>
        ))}
      </div>

      <Modal open={!!modal} onClose={() => setModal(null)} title={modal?.mode === 'create' ? '+ Nuevo Servicio' : '✏️ Editar Servicio'}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <div style={{ gridColumn: '1/-1' }}>
            <FormField label="Nombre del servicio">
              <input className="tf-input" value={form.name || ''} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Ej: Caja" />
            </FormField>
          </div>
          <FormField label="Prefijo (1-2 letras)">
            <input className="tf-input" value={form.prefix || ''} onChange={e => setForm(f => ({ ...f, prefix: e.target.value.toUpperCase().slice(0, 2) }))} placeholder="Ej: C" maxLength={2} />
          </FormField>
          <FormField label="Emoji / Ícono">
            <input className="tf-input" value={form.emoji || ''} onChange={e => setForm(f => ({ ...f, emoji: e.target.value }))} placeholder="💳" />
          </FormField>
          <FormField label="Color">
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <input type="color" value={form.color || '#6366F1'} onChange={e => setForm(f => ({ ...f, color: e.target.value }))} style={{ width: 44, height: 38, border: 'none', cursor: 'pointer', background: 'none', padding: 0 }} />
              <input className="tf-input" value={form.color || ''} onChange={e => setForm(f => ({ ...f, color: e.target.value }))} placeholder="#6366F1" style={{ flex: 1 }} />
            </div>
          </FormField>
          <FormField label="Tiempo promedio (min)">
            <input className="tf-input" type="number" min={1} value={form.avgTime || 5} onChange={e => setForm(f => ({ ...f, avgTime: +e.target.value }))} />
          </FormField>
          <div style={{ gridColumn: '1/-1' }}>
            <FormField label="Descripción">
              <input className="tf-input" value={form.description || ''} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="Breve descripción del servicio" />
            </FormField>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
          <Btn onClick={() => setModal(null)} variant="secondary" full>Cancelar</Btn>
          <Btn onClick={save} variant="primary" full disabled={loading}>{loading ? <Spinner size={16} /> : 'Guardar'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

// --- Admin: Stations ---
function AdminStations({ toast }) {
  const [stations, setStations] = useState([]);
  const [services, setServices] = useState([]);
  const [users, setUsers]     = useState([]);
  const [modal, setModal]     = useState(null);
  const [form, setForm]       = useState({});
  const [loading, setLoading] = useState(false);

  const refresh = useCallback(async () => {
    try {
      const [st, sv, us] = await Promise.all([
        API.get('/api/stations'), API.get('/api/services'), API.get('/api/users'),
      ]);
      setStations(st); setServices(sv); setUsers(us.filter(u => u.role === 'agente' && u.active));
    } catch (e) { toast(e.message, 'error'); }
  }, []);
  useEffect(() => { refresh(); }, [refresh]);

  const openCreate = () => { setForm({ serviceIds: [], active: true }); setModal({ mode: 'create' }); };
  const openEdit   = s => { setForm({ ...s, serviceIds: s.serviceIds || [] }); setModal({ mode: 'edit', id: s.id }); };

  const toggleService = id => setForm(f => ({
    ...f,
    serviceIds: f.serviceIds.includes(id)
      ? f.serviceIds.filter(s => s !== id)
      : [...f.serviceIds, id],
  }));

  const save = async () => {
    if (!form.name) { toast('Nombre es obligatorio', 'warning'); return; }
    setLoading(true);
    try {
      if (modal.mode === 'create') await API.post('/api/stations', form);
      else await API.put(`/api/stations/${modal.id}`, form);
      toast('Ventanilla guardada', 'success'); setModal(null); refresh();
    } catch (e) { toast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  const del = async id => {
    if (!confirm('¿Eliminar esta ventanilla?')) return;
    try { await API.delete(`/api/stations/${id}`); toast('Ventanilla eliminada', 'success'); refresh(); }
    catch (e) { toast(e.message, 'error'); }
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
        <div>
          <h2 style={{ fontSize: 24, fontWeight: 800, margin: 0 }}>Ventanillas</h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 14, margin: '4px 0 0' }}>Puestos de atención y asignación de agentes</p>
        </div>
        <Btn onClick={openCreate} variant="primary">+ Nueva Ventanilla</Btn>
      </div>
      <div className="card" style={{ overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead style={{ background: 'var(--bg-card2)' }}>
            <tr style={{ fontSize: 12, color: 'var(--text-muted)', textTransform: 'uppercase' }}>
              {['Nombre', 'Servicios que atiende', 'Agente asignado', 'Estado', 'Acciones'].map(h => (
                <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontWeight: 700 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {stations.map(st => (
              <tr key={st.id} className="tr-hover" style={{ borderTop: '1px solid var(--border)', fontSize: 14 }}>
                <td style={{ padding: '13px 16px', fontWeight: 600 }}>{st.name}</td>
                <td style={{ padding: '13px 16px' }}>
                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                    {(st.serviceIds || []).map(sid => {
                      const svc = services.find(s => s.id === sid);
                      return svc ? <Badge key={sid} color={svc.color}>{svc.emoji} {svc.name}</Badge> : null;
                    })}
                    {(st.serviceIds || []).length === 0 && <span style={{ color: 'var(--text-dim)', fontSize: 13 }}>Sin servicios</span>}
                  </div>
                </td>
                <td style={{ padding: '13px 16px', color: 'var(--text-muted)' }}>
                  {users.find(u => u.id === st.agentId)?.name || <span style={{ color: 'var(--text-dim)' }}>Sin asignar</span>}
                </td>
                <td style={{ padding: '13px 16px' }}>
                  <span style={{ fontSize: 11, padding: '3px 8px', borderRadius: 99, fontWeight: 600, background: st.active ? '#10B98122' : '#EF444422', color: st.active ? '#10B981' : '#EF4444' }}>
                    {st.active ? '● Activo' : '○ Inactivo'}
                  </span>
                </td>
                <td style={{ padding: '13px 16px' }}>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <Btn onClick={() => openEdit(st)} variant="secondary" size="sm">Editar</Btn>
                    <Btn onClick={() => del(st.id)} variant="ghost" size="sm">Eliminar</Btn>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <Modal open={!!modal} onClose={() => setModal(null)} title={modal?.mode === 'create' ? '+ Nueva Ventanilla' : '✏️ Editar Ventanilla'}>
        <FormField label="Nombre de la ventanilla">
          <input className="tf-input" value={form.name || ''} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Ej: Caja 1" />
        </FormField>
        <FormField label="Servicios que atiende (seleccionar varios)">
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {services.map(s => (
              <div key={s.id} onClick={() => toggleService(s.id)}
                style={{ padding: '7px 14px', borderRadius: 8, cursor: 'pointer', fontSize: 13, fontWeight: 600, transition: 'all 0.15s',
                  background: (form.serviceIds || []).includes(s.id) ? s.color + '33' : 'var(--bg-card2)',
                  border: `1px solid ${(form.serviceIds || []).includes(s.id) ? s.color : 'var(--border-light)'}`,
                  color: (form.serviceIds || []).includes(s.id) ? s.color : 'var(--text-muted)',
                }}>
                {s.emoji} {s.name}
              </div>
            ))}
          </div>
        </FormField>
        <FormField label="Agente asignado">
          <select className="tf-select" style={{ width: '100%' }} value={form.agentId || ''} onChange={e => setForm(f => ({ ...f, agentId: e.target.value }))}>
            <option value="">— Sin asignar —</option>
            {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        </FormField>
        <div style={{ display: 'flex', gap: 10, marginTop: 20 }}>
          <Btn onClick={() => setModal(null)} variant="secondary" full>Cancelar</Btn>
          <Btn onClick={save} variant="primary" full disabled={loading}>{loading ? <Spinner size={16} /> : 'Guardar'}</Btn>
        </div>
      </Modal>
    </div>
  );
}

  useEffect(() => {
    API.get('/api/config').then(setConfig).catch(e => toast(e.message, 'error'));

          <F label="Subtítulo" field="businessSubtitle" placeholder="Sistema de Turnos" />

            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>

        <div className="card" style={{ padding: 22, gridColumn: '1/-1' }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, marginTop: 0 }}>🔊 Opciones</h3>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <input type="checkbox" id="sound" checked={!!config.soundEnabled} onChange={e => setConfig(c => ({ ...c, soundEnabled: e.target.checked }))} style={{ width: 16, height: 16 }} />

      <div style={{ marginTop: 24, maxWidth: 760 }}>

      </div>
    </div>
  );
}

// ============================================================
// CLOCK COMPONENT
// ============================================================
function Clock({ large }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const iv = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(iv);
  }, []);
  return (
    <div className="mono" style={{ fontSize: large ? 24 : 14, fontWeight: 700, color: large ? 'var(--text)' : 'var(--text-muted)', letterSpacing: 1 }}>
      {time.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })}
    </div>
  );
}

// ============================================================
// ERROR BOUNDARY — evita que crashes de render destruyan la app
// ============================================================
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(err) { return { error: err }; }
  componentDidCatch(err, info) { console.error('[ErrorBoundary]', err, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ minHeight: '100vh', background: 'var(--bg-base)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, padding: 40 }}>
          <div style={{ fontSize: 48 }}>⚠️</div>
          <h2 style={{ fontWeight: 800, fontSize: 22, margin: 0 }}>Error en la pantalla</h2>
          <pre style={{ fontSize: 12, color: '#EF4444', background: '#1a0a0a', padding: 16, borderRadius: 8, maxWidth: 600, overflow: 'auto' }}>
            {this.state.error.message}
          </pre>
          <button onClick={() => { this.setState({ error: null }); window.location.reload(); }}
            style={{ background: 'var(--primary)', color: '#fff', border: 'none', padding: '10px 24px', borderRadius: 8, cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>
            Recargar
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ============================================================
// SOCKET SINGLETON — fuera de React para evitar desconexiones por ciclo de vida
// ============================================================
const _socket = io({
  transports: ['websocket', 'polling'],
  reconnection: true,
  reconnectionDelay: 1000,
  reconnectionAttempts: Infinity,
  timeout: 10000,
});
_socket.on('connect',    () => console.log('[WS] Conectado:', _socket.id));
_socket.on('disconnect', r  => console.log('[WS] Desconectado:', r));
_socket.on('connect_error', e => console.warn('[WS] Error de conexión:', e.message));

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [path, setPath] = useState(() => window.location.hash.slice(1) || '/');
  const [user, setUser]   = useState(null);
  const [authChecked, setAuthChecked] = useState(false);

  useEffect(() => {
    const handler = () => setPath(window.location.hash.slice(1) || '/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  useEffect(() => {
    const token = API.token;
    if (token) {
      API.get('/api/auth/me')
        .then(u => { setUser(u); })
        .catch(() => { API.token = null; })
        .finally(() => setAuthChecked(true));
    } else { setAuthChecked(true); }
  }, []);

  const navigate = to => { window.location.hash = to; };

  const login = async (username, password) => {
    const data = await API.post('/api/auth/login', { username, password });
    API.token = data.token;
    setUser(data.user);
    if (data.user.role === 'agente') navigate('/agent');
    else navigate('/admin');
    return data;
  };

  const logout = async () => {
    try { await API.post('/api/auth/logout', {}); } catch {}
    API.token = null;
    setUser(null);
    navigate('/');
  };

  if (!authChecked) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-base)', flexDirection: 'column', gap: 16 }}>
      <Spinner size={40} />
      <p style={{ color: 'var(--text-muted)', fontSize: 14 }}>Iniciando TurnoFácil...</p>
    </div>
  );

  const route = path.split('?')[0];

  if (route === '/monitor') return <MonitorPage socket={_socket} />;
  if (route === '/totem')   return <TotemPage socket={_socket} />;

  if (route === '/agent') {
    if (!user || user.role !== 'agente') return <LoginPage onLogin={login} redirectTo="/agent" />;
    return <AgentPage user={user} socket={_socket} onLogout={logout} />;
  }

  if (route === '/admin') {
    if (!user || !['admin', 'gerente'].includes(user.role)) return <LoginPage onLogin={login} redirectTo="/admin" />;
    return <AdminPage user={user} socket={_socket} onLogout={logout} />;
  }

  return <HomePage navigate={navigate} />;
}

// RENDER
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <ThemeProvider>
      <ToastProvider>
        <App />
      </ToastProvider>
    </ThemeProvider>
  </ErrorBoundary>
);
  </script>
